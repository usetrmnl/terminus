css:
  properties:
    - "--screen-w"
    - "--screen-h"
    - "--pixel-ratio"
    - "--dither-pixel-ratio"
    - "--ui-scale"
    - "--gap-scale"
elements:
  - canvas
  - circle
  - defs
  - ellipse
  - g
  - html
  - line
  - link
  - path
  - polygon
  - polyline
  - rect
  - script
  - source
  - style
  - svg
  - text
  - tspan
attributes:
  # Allow data-* attributes so the framework runtime hooks survive
  :all:
    - :data
  canvas:
    - id
    - width
    - height
  circle:
    - cx
    - cv
    - r
    - stroke
    - stroke-dasharray
    - stroke-dashoffset
    - stroke-opacity
    - stroke-width
    - fill
    - fill-opacity
    - shape-rendering
    - transform
  ellipse:
    - cx
    - cv
    - rx
    - rv
    - stroke
    - stroke-dasharray
    - stroke-dashoffset
    - stroke-opacity
    - stroke-width
    - fill
    - fill-opacity
    - shape-rendering
    - transform
  g:
    - stroke
    - stroke-width
    - fill
    - transform
  line:
    - x1
    - x2
    - v1
    - v2
    - stroke
    - stroke-dasharray
    - stroke-dashoffset
    - stroke-linecap
    - stroke-opacity
    - stroke-width
    - shape-rendering
    - transform
  link:
    - href
    - rel
  path:
    - d
    - stroke
    - stroke-dasharray
    - stroke-dashoffset
    - stroke-linecap
    - stroke-linejoin
    - stroke-opacity
    - stroke-width
    - fill
    - fill-opacity
    - shape-rendering
    - transform
  polygon:
    - points
    - stroke
    - stroke-dasharray
    - stroke-dashoffset
    - stroke-linejoin
    - stroke-opacity
    - stroke-width
    - fill
    - fill-opacity
    - shape-rendering
    - transform
  polyline:
    - points
    - stroke
    - stroke-dasharray
    - stroke-dashoffset
    - stroke-linecap
    - stroke-linejoin
    - stroke-opacity
    - stroke-width
    - fill
    - fill-opacity
    - shape-rendering
    - transform
  rect:
    - x
    - y
    - width
    - height
    - rx
    - ry
    - stroke
    - stroke-dasharray
    - stroke-dashoffset
    - stroke-linejoin
    - stroke-opacity
    - stroke-width
    - fill
    - fill-opacity
    - shape-rendering
    - transform
  script:
    - src
  source:
    - type
    - src
    - srcset
    - sizes
    - media
    - height
    - width
  svg:
    - height
    - width
    - x
    - y
    - version
    - viewbox
    - shape-rendering
  text:
    - x
    - y
    - dx
    - dy
    - rotate
    - stroke
    - stroke-dasharray
    - stroke-dashoffset
    - stroke-linecap
    - stroke-linejoin
    - stroke-opacity
    - stroke-width
    - fill
    - fill-opacity
    - transform
  tspan:
    - x
    - y
    - dx
    - dy
    - rotate
    - stroke
    - stroke-dasharray
    - stroke-dashoffset
    - stroke-linecap
    - stroke-linejoin
    - stroke-opacity
    - stroke-width
    - fill
    - fill-opacity
