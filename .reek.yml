      - Terminus::Actions::HomeAssistant::Entities::Index#scoped_entities
      - Terminus::Actions::Settings::HomeAssistant::Update#assign_token
      - Terminus::Structs::HomeAssistantConnection#masked_access_token
      - Terminus::Aspects::HomeAssistant::Client#normalized_base_url
      - Terminus::Aspects::Extensions::Renderers::HomeAssistant#build_entity_payload
      - Terminus::Aspects::Extensions::Renderers::HomeAssistant#fetch_entities
