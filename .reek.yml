exclude_paths:
  - tmp
  - vendor

detectors:
  Attribute:
    exclude:
      - Terminus::Views::Parts::User#password
  ControlParameter:
    exclude:
      - Terminus::Aspects::PasswordEncryptor#call
      - Terminus::Aspects::Playlists::SlideWindow#screens
      - Terminus::Aspects::HomeAssistant::Client#validate_connection
      - Terminus::Aspects::HomeAssistant::EndpointFetcher#call
      - Terminus::Aspects::HomeAssistant::EntityFetcher#fetch_one
  BooleanParameter:
    exclude:
      - Terminus::Aspects::HomeAssistant::Client#call
      - Terminus::Aspects::HomeAssistant::Client#fetch
      - Terminus::Aspects::HomeAssistant::EndpointFetcher#call
      - Terminus::Aspects::HomeAssistant::EntityFetcher#call
  DataClump:
    exclude:
      - Terminus::Actions::API::Base
      - Terminus::Aspects::Croner
      - Terminus::Aspects::ProblemDetail
      - Terminus::Aspects::Screens::Shoter
      - Terminus::Repositories::Screen
      - Terminus::Aspects::HomeAssistant::Client
      - Terminus::Aspects::HomeAssistant::EntityFetcher
      - Terminus::Aspects::Extensions::Renderers::HomeAssistant
  FeatureEnvy:
    exclude:
      - Terminus::Action#authorize
      - Terminus::Actions::API::Base#detail_duplicate
      - Terminus::Actions::API::Base#detail_enum
      - Terminus::Actions::API::Base#detail_foreign_key
      - Terminus::Actions::API::Devices::Create#unprocessable_content
      - Terminus::Actions::API::Devices::Patch#unprocessable_content
      - Terminus::Actions::API::Firmware::Create#unprocessable_content
      - Terminus::Actions::API::Firmware::Create#unprocessable_download
      - Terminus::Actions::API::Firmware::Delete#failure
      - Terminus::Actions::API::Firmware::Patch#unprocessable_content
      - Terminus::Actions::API::Firmware::Patch#unprocessable_download
      - Terminus::Actions::API::Models::Create#unprocessable_content
      - Terminus::Actions::API::Models::Patch#unprocessable_content
      - Terminus::Actions::API::Playlists::Create#unprocessable_content
      - Terminus::Actions::API::Playlists::Patch#unprocessable_content
      - Terminus::Actions::API::Screens::Create#handle
      - Terminus::Actions::API::Screens::Create#save
      - Terminus::Actions::API::Screens::Create#unprocessable_content_for_creation
      - Terminus::Actions::API::Screens::Create#unprocessable_content_for_parameters
      - Terminus::Actions::API::Screens::Delete#failure
      - Terminus::Actions::API::Screens::Patch#replace
      - Terminus::Actions::API::Screens::Patch#unprocessable_content_for_creation
      - Terminus::Actions::API::Screens::Patch#unprocessable_content_for_parameters
      - Terminus::Actions::Devices::Create#provision
      - Terminus::Actions::Devices::Create#render_new
      - Terminus::Actions::Devices::Update#edit
      - Terminus::Actions::Extensions::Clone::Create#error
      - Terminus::Actions::Extensions::Create#error
      - Terminus::Actions::Extensions::Gallery::Create#render_error
      - Terminus::Actions::Extensions::Gallery::Create#render_schema_error
      - Terminus::Actions::Extensions::Gallery::Index#render_error
      - Terminus::Actions::Extensions::Update#error
      - Terminus::Actions::Firmware::Create#error
      - Terminus::Actions::Firmware::Delete#render
      - Terminus::Actions::Firmware::Update#error
      - Terminus::Actions::Models::Update#error
      - Terminus::Actions::Playlists::Create#error
      - Terminus::Actions::Playlists::Items::Edit#screen_options
      - Terminus::Actions::Playlists::Items::New#screen_options
      - Terminus::Actions::Playlists::Screens::Show#view_settings
