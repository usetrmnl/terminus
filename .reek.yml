    enabled: false
  TooManyInstanceVariables:
    exclude:
      - Terminus::Aspects::Screens::Placeholder
  TooManyStatements:
    exclude:
      - RackLoggerPatch#prepare_app_providers
      - Terminus::Action#handle_rodauth_redirect
      - Terminus::Actions::Extensions::Poll::Show#fetch
      - Terminus::Aspects::Croner#call
      - Terminus::Aspects::Extensions::Fetchers::Sole#parse
      - Terminus::Aspects::Extensions::Fetchers::Sole#process
      - Terminus::Aspects::Extensions::Importers::Remote::Transformer#process
      - Terminus::Aspects::Extensions::Parser#from_json
      - Terminus::Aspects::Firmware::Downloader#get
      - Terminus::Aspects::Screens::Compressor#call
      - Terminus::Aspects::Screens::Converters::Color#convert
      - Terminus::Aspects::Screens::Converters::Monochrome#convert
      - Terminus::Aspects::Screens::Placeholder#initialize
      - Terminus::Aspects::Screens::Shoter#save
      - Terminus::Providers::Sidekiq#load_schedule
      - Terminus::Views::Parts::Device#battery_voltage_to_percent
      - Terminus::Views::Parts::Device#wifi_percentage
      - Terminus::Actions::HomeAssistant::Entities::Index#filter
      - Terminus::Actions::HomeAssistant::Entities::Index#handle
      - Terminus::Actions::HomeAssistant::Media::Show#handle
      - Terminus::Aspects::Extensions::Renderers::HomeAssistant#build_entity_payload
      - Terminus::Aspects::Extensions::Renderers::HomeAssistant#call
      - Terminus::Aspects::HomeAssistant::Client#fetch
      - Terminus::Aspects::HomeAssistant::EndpointFetcher#call
  UtilityFunction:
    exclude:
      - SQLLoggerPatch#log_query
      - Terminus::Aspects::Croner
      - Terminus::Aspects::Liquid::Filters#json
      - Terminus::Aspects::ProblemDetail#duplicate
      - Terminus::Aspects::ProblemDetail#foreign_key
      - Terminus::Actions::HomeAssistant::Entities::Index#render_error
      - Terminus::Actions::HomeAssistant::Entities::Index#render_payload
      - Terminus::Actions::HomeAssistant::Entities::Index#simplify
      - Terminus::Actions::HomeAssistant::Media::Show#bad_gateway
      - Terminus::Actions::HomeAssistant::Media::Show#bad_request
      - Terminus::Actions::HomeAssistant::Media::Show#render_upstream
      - Terminus::Actions::HomeAssistant::Media::Show#safe_path?
      - Terminus::Actions::Settings::HomeAssistant::Update#base_values
      - Terminus::Aspects::Extensions::Renderers::HomeAssistant#build_aliases
      - Terminus::Aspects::HomeAssistant::EndpointFetcher#unsafe_path?
      - Terminus::Aspects::HomeAssistant::UrlNormalizer#proxied_path?
      - build_extension
  DuplicateMethodCall:
    exclude:
      - Terminus::Aspects::Devices::Provisioner#create
      - Terminus::Actions::HomeAssistant::Entities::Index#handle
      - Terminus::Actions::HomeAssistant::Entities::Index#simplify
      - Terminus::Actions::HomeAssistant::Media::Show#render_upstream
      - Terminus::Actions::Settings::HomeAssistant::Test#handle
      - Terminus::Aspects::Extensions::Renderers::HomeAssistant#build_aliases
      - Terminus::Aspects::Extensions::Renderers::HomeAssistant#fetch
      - Terminus::Aspects::HomeAssistant::Client#build_failure
