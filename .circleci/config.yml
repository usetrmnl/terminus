version: 2.1
jobs:
  build:
    working_directory: ~/project
    docker:
      - image: bkuhlmann/debian-ruby:latest
        environment:
          APP_SECRET: 89637534f5ef577003a625c4f415b374c0164c8ecaf8f6299c84e83f6e54523e
          HANAMI_ENV: test
          HANAMI_PORT: 2300
          API_URI: http://localhost:2300
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          KEYVALUE_URL: redis://localhost:6379/1
      - image: postgres:latest
        environment:
          POSTGRES_PASSWORD: postgres
      - image: valkey/valkey:latest
    steps:
      - run:
          name: Haskell Dockerfile Linter Install
          command: |
            curl --location --output /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
            chmod +x /usr/local/bin/hadolint

      - run:
          name: ImageMagick Install
          command: apt-get update && apt-get install -y imagemagick

      - run:
          name: Chromium Install
          command: apt-get install -y chromium

      - run:
          name: Node Install
          command: apt-get install -y nodejs npm

      - checkout

      - restore_cache:
          name: Gems Restore
          keys:
            - gem-cache-4-{{.Branch}}-{{checksum "Gemfile.lock"}}
            - gem-cache-

      - run:
          name: Gems Install
          command: |
            gem update --system
            bundle config set path "vendor/bundle"
            bundle install

      - save_cache:
          name: Gems Store
          key: gem-cache-4-{{.Branch}}-{{checksum "Gemfile.lock"}}
          paths:
            - vendor/bundle

      - restore_cache:
          name: Packages Restore
          keys:
            - package-cache-4-{{.Branch}}-{{checksum "package.json"}}
            - package-cache-

      - run:
          name: Packages Install
          command: npm install

      - save_cache:
          name: Packages Store
          key: package-cache-4-{{.Branch}}-{{checksum "package.json"}}
          paths:
            - node_modules

      - run:
          name: Project Setup
          command: mkdir log

      - run:
          name: Database Setup
          command: bin/hanami db prepare

      - run:
          name: Build
          command: |
            bin/hanami assets compile
            bin/rake

      - store_artifacts:
          name: SimpleCov Archive
          path: ~/project/coverage
          destination: coverage
