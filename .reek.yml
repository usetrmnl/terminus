      - Terminus::Actions::Users::Update#error
      - Terminus::Aspects::Extensions::Cloner#build_attributes
      - Terminus::Aspects::Extensions::Fetchers::Sole#maybe_alter_mime_type
      - Terminus::Aspects::Extensions::Importers::Remote::Extractor#build
      - Terminus::Aspects::Extensions::Importers::Remote::Transformers::Kind#process
      - Terminus::Aspects::Extensions::Renderers::Image#render_multiple
      - Terminus::Aspects::Playlists::ScreenOptioner#call
      - Terminus::Aspects::ProblemDetail#enum
      - Terminus::Aspects::Screens::Compressor#convert
      - Terminus::Aspects::Screens::Converters::Color#convert
      - Terminus::Aspects::Screens::Converters::Monochrome#as_one_bit
      - Terminus::Aspects::Screens::Converters::Monochrome#as_one_bit_dither
      - Terminus::Aspects::Screens::Converters::Monochrome#as_two_to_eight_bit
      - Terminus::Aspects::Screens::Converters::Monochrome#as_two_to_eight_bit
      - Terminus::Aspects::Screens::Converters::Monochrome#as_two_to_four_bit_dither
